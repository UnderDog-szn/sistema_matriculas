{% load static %}
<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <title>SMA - UNICUALQUIERA</title>
</head>

<body>
    <nav class="navbar navbar-expand-lg navbar-light bg-white shadow-sm px-4 py-2">
        <a class="navbar-brand fw-bold" href="{% url 'inicio' %}">
            <img src="{% static 'img/logo.png' %}" height="40" class="me-2">
            UNICUALQUIERA
        </a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
            <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navbarNav">
            <ul class="navbar-nav ms-auto gap-2">
                <li class="nav-item dropdown">
                    <a class="nav-link dropdown-toggle fw-semibold" href="#" id="dropdownEstudiantes" role="button"
                        data-bs-toggle="dropdown">
                        Estudiantes
                    </a>
                    <ul class="dropdown-menu" aria-labelledby="dropdownEstudiantes">
                        <li><a class="dropdown-item" href="{% url 'crear_estudiante' %}">Registrar estudiante</a></li>
                        <li><a class="dropdown-item" href="{% url 'lista_estudiantes' %}">Ver estudiantes</a></li>
                    </ul>
                </li>
                <li class="nav-item dropdown">
                    <a class="nav-link dropdown-toggle fw-semibold" href="#" id="dropdownDocentes" role="button"
                        data-bs-toggle="dropdown">
                        Docentes
                    </a>
                    <ul class="dropdown-menu" aria-labelledby="dropdownDocentes">
                        <li><a class="dropdown-item" href="{% url 'crear_docente' %}">Registrar docente</a></li>
                        <li><a class="dropdown-item" href="{% url 'lista_docentes' %}">Ver docentes</a></li>
                    </ul>
                </li>
                <li class="nav-item dropdown">
                    <a class="nav-link dropdown-toggle fw-semibold" href="#" id="dropdownAsignaturas" role="button"
                        data-bs-toggle="dropdown">
                        Asignaturas
                    </a>
                    <ul class="dropdown-menu" aria-labelledby="dropdownAsignaturas">
                        <li><a class="dropdown-item" href="{% url 'crear_asignatura' %}">Registrar asignatura</a></li>
                        <li><a class="dropdown-item" href="{% url 'lista_asignaturas' %}">Ver asignaturas</a></li>
                    </ul>
                </li>
            </ul>
        </div>
    </nav>

    {% block content %}
    {% endblock %}

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

</body>

</html>
