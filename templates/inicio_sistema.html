{% extends 'base_layout.html' %}
{% load static %}

{% block content %}
<div style="display: flex; min-height: 90vh;">
    
    <!-- Panel izquierdo -->
    <div style="flex: 1; padding: 80px 60px; display: flex; flex-direction: column; justify-content: center; background: #f5f0e8;">
        <p style="font-size: 13px; color: #666;">Sistema Académico</p>
        <h1 style="font-size: 3rem; font-weight: 800; line-height: 1.1;">Sistema de<br>Matrículas<br>UNICUALQUIERA</h1>
        <span style="display: inline-block; margin-top: 20px; padding: 6px 14px; background: #e0dbd0; border-radius: 20px; font-size: 13px;">Gestión Académica</span>
        <p style="margin-top: 30px; color: #444;">Registra y gestiona estudiantes, docentes y asignaturas desde un solo lugar.</p>
        <a href="{% url 'crear_estudiante' %}" class="btn btn-dark mt-3" style="width: fit-content;">Comenzar →</a>
    </div>

    <!-- Panel derecho con imagen -->
    <div style="flex: 1.2; background-image: url('{% static 'img/fondo.jpg' %}'); background-size: cover; background-position: center;">
    </div>

</div>
{% endblock %}
